<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ANDROMEDA</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a0f1f;
    color: white;
    overflow: hidden;
}

/* TOP BAR */
#topbar {
    display: flex;
    align-items: center;
    padding: 6px;
    background: #0d1b2a;
    gap: 6px;
}

/* TABS */
#tabs {
    display: flex;
    gap: 6px;
}

.tab {
    padding: 6px 10px;
    background: #13294b;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
}

.tab.active {
    background: #7c4dff;
    box-shadow: 0 0 10px rgba(124,77,255,0.5);
}

/* URL BAR */
#url {
    flex: 1;
    padding: 8px;
    border: none;
    outline: none;
    border-radius: 8px;
    background: #13294b;
    color: white;
}

/* BUTTONS */
button {
    background: #13294b;
    border: none;
    color: white;
    padding: 6px 10px;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #7c4dff;
}

/* FRAME */
iframe {
    width: 100%;
    height: calc(100vh - 40px);
    border: none;
}

/* LOADING BAR */
#loading {
    height: 3px;
    width: 0%;
    background: #7c4dff;
    transition: width 0.2s;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div id="topbar">

    <div id="tabs"></div>

    <button onclick="back()">←</button>
    <button onclick="forward()">→</button>
    <button onclick="refresh()">⟳</button>

    <input id="url" placeholder="Search or enter URL">

    <button onclick="openInternal('about:settings')">Settings</button>
    <button onclick="openExternal('https://discord.gg/uZNkt63FHA')">Discord</button>

    <button onclick="newTab()">＋</button>

</div>

<div id="loading"></div>

<!-- BROWSER -->
<iframe id="frame"></iframe>

<!-- APP SCRIPT -->
<script src="app.js"></script>

</body>
</html>
